<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lista de Médicos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

<!-- Navbar Responsiva -->
<nav class="bg-blue-600 text-white px-6 py-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <div class="text-xl font-bold">HealthManager</div>
        <div class="md:hidden">
            <button id="menu-btn" class="focus:outline-none">
                <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24">
                    <path d="M4 5h16M4 12h16M4 19h16"/>
                </svg>
            </button>
        </div>
        <ul class="hidden md:flex space-x-6">
            <li><a href="/clinica/paciente" class="hover:underline">Pacientes</a></li>
            <li><a href="/clinica/medico" class="hover:underline">Médicos</a></li>
            <li><a href="/clinica/consulta" class="hover:underline">Consultas</a></li>
            <li><a href="/clinica/gerencia" class="hover:underline">Gerência</a></li>
        </ul>
    </div>
    <!-- Menu Mobile -->
    <div id="mobile-menu" class="md:hidden hidden mt-2 space-y-2 px-4">
        <a href="/clinica/paciente" class="block">Pacientes</a>
        <a href="/clinica/medico" class="block">Médicos</a>
        <a href="/clinica/consulta" class="block">Consultas</a>
        <a href="/clinica/gerencia" class="block">Gerência</a>
    </div>
</nav>

<!-- Conteúdo Principal -->
<div class="max-w-5xl mx-auto p-6">
    <h1 class="text-3xl font-bold mb-6">Lista de Médicos</h1>

    <div class="mb-4 text-right">
        <a th:href="@{/clinica/medico/new}" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded">
            Novo Médico
        </a>
    </div>

    <table class="min-w-full bg-white shadow-md rounded-lg overflow-hidden">
        <thead class="bg-blue-600 text-white">
        <tr>
            <th class="py-3 px-6 text-left">ID</th>
            <th class="py-3 px-6 text-left">Nome</th>
            <th class="py-3 px-6 text-left">CRM</th>
            <th class="py-3 px-6 text-left">Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="medico : ${medicos}" class="border-b hover:bg-gray-100">
            <td class="py-3 px-6" th:text="${medico.id}"></td>
            <td class="py-3 px-6" th:text="${medico.nome}"></td>
            <td class="py-3 px-6" th:text="${medico.crm}"></td>
            <td class="py-3 px-6 space-x-2">
                <a th:href="@{/clinica/medico/edit/{id}(id=${medico.id})}" class="text-yellow-600 hover:underline">Editar</a>
                <a th:href="@{/clinica/medico/delete/{id}(id=${medico.id})}"
                   class="text-red-600 hover:underline"
                   onclick="return confirm('Tem certeza que deseja excluir este médico?');">
                    Excluir
                </a>

            </td>
        </tr>
        </tbody>
    </table>
</div>

<!-- Script para ativar o menu mobile -->
<script>
    const menuBtn = document.getElementById('menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    menuBtn.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
    });
</script>

</body>
</html>
