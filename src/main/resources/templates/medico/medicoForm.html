<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title th:text="${paciente.id == null ? 'Novo Paciente' : 'Editar Paciente'}"></title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 p-6">
<div class="max-w-lg mx-auto bg-white p-6 shadow-md rounded-lg">
    <h2 class="text-2xl font-bold mb-4" th:text="${paciente.id == null ? 'Novo Paciente' : 'Editar Paciente'}"></h2>

    <form th:action="@{${paciente.id} == null ? '/clinica/paciente/save' : '/clinica/paciente/update/' + paciente.id}"
          th:object="${paciente}" method="post" class="space-y-4">

        <!-- Campo oculto para ID de edição -->
        <input type="hidden" th:if="${paciente.id != null}" th:field="*{id}"/>

        <!-- Campo de Nome -->
        <div>
            <label class="block font-semibold mb-1">Nome</label>
            <input type="text" th:field="*{nome}" class="w-full border border-gray-300 rounded px-3 py-2" required/>
        </div>

        <!-- Campo de Telefone -->
        <div>
            <label class="block font-semibold mb-1">Telefone</label>
            <input type="text" th:field="*{telefone}" class="w-full border border-gray-300 rounded px-3 py-2" required/>
        </div>

        <!-- Botões -->
        <div class="flex justify-end space-x-2">
            <a th:href="@{/clinica/paciente}" class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">Cancelar</a>
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                <span th:text="${paciente.id == null ? 'Salvar' : 'Atualizar'}"></span>
            </button>
        </div>
    </form>
</div>
</body>
</html>
